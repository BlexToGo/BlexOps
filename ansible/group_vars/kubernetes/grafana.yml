---
# renovate: oci-helm=ghcr.io/grafana-community/helm-charts/grafana
grafana_chart_version: 12.4.5

grafana_admin_username: "{{ lookup('community.general.onepassword', 'Grafana', field='username', vault='BlexOps', subdomain=onepassword_subdomain, domain=onepassword_domain, service_account_token=onepassword_service_account_token) }}"
grafana_admin_password: "{{ lookup('community.general.onepassword', 'Grafana', field='password', vault='BlexOps', subdomain=onepassword_subdomain, domain=onepassword_domain, service_account_token=onepassword_service_account_token) }}"

# --- Cloudflare Access auth (auth.proxy) ---
# Cloudflare Access authenticates users at the edge (Google OAuth) and sets
# the Cf-Access-Authenticated-User-Email header. Grafana trusts this header
# via auth.proxy, which also creates proper session cookies.
# Access apps, policies, and the Google IdP are managed by OpenTofu
# (see /tofu/cloudflare.tf). The team name is read from 1Password.
grafana_cloudflare_access_team_name: "{{ lookup('community.general.onepassword', 'Cloudflare', field='team name', vault='BlexOps', subdomain=onepassword_subdomain, domain=onepassword_domain, service_account_token=onepassword_service_account_token) }}"

grafana_values:

  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  grafana.ini:
    server:
      root_url: "https://grafana.{{ domain_name }}/"
    auth:
      # Cloudflare Access already authenticated the user; hide Grafana's own
      # login form and signout (Cloudflare manages the session).
      disable_login_form: true
      disable_signout_menu: false
      signout_redirect_url: "https://{{ grafana_cloudflare_access_team_name }}.cloudflareaccess.com/cdn-cgi/access/logout"
    auth.basic:
      enabled: false
    auth.anonymous:
      enabled: false
    auth.proxy:
      enabled: true
      header_name: Cf-Access-Authenticated-User-Email
      header_property: email
      auto_sign_up: true
      auto_assign_org_role: Admin
      # No session tokens needed — every request is authenticated by the
      # Cf-Access-Authenticated-User-Email header via Cloudflare Access.
      enable_login_token: false

  plugins:
    - victoriametrics-logs-datasource

  # ingress:
  #   enabled: true
  #   ingressClassName: public
  #   annotations:
  #     cert-manager.io/cluster-issuer: "{{ cert_manager_cluster_issuer_name }}"
  #   hosts:
  #     - "grafana.{{ domain_name }}"
  #   path: "/"
  #   tls:
  #     - secretName: grafana-tls
  #       hosts:
  #         - "grafana.{{ domain_name }}"

  securityContext:
    runAsUser: 472
    runAsGroup: 472
    # set group ownership of the Grafana data directory to Grafana's uid/gid 472 so that Grafana can write to it when running as non-root
    fsGroup: 472

  initChownData:
    enabled: false

  persistence:
    enabled: true
    type: pvc
    existingClaim: grafana

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  sidecar:
    # Disable tls verification for sidecar api calls to avoid certificate verification errors because python 3.14 (used in the kiwigrid/k8s-sidecar) enforces stricter SSL validation on the Kubernetes API server CA cert
    skipTlsVerify: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      env:
        # Change the health endpoint port of the kiwigrid/k8s-sidecar because both try to bind the same port
        HEALTH_PORT: 8081
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: grafana_folder
      searchNamespace: ALL
      provider:
        foldersFromFilesStructure: true
      env:
        # Change the health endpoint port of the kiwigrid/k8s-sidecar because both try to bind the same port
        HEALTH_PORT: 8082
    # The probes are currently exec probes because at the moment the grafana helm chart (grafana-11.6.1) only supports uniform liveness/readiness probes for all sidecars which we can't use because the sidecars need to have different ports for their health checks or one will fail to bind the port and silently crash
    livenessProbe:
      exec:
        command: ["/bin/sh", "-c", "wget -q -O- http://localhost:$HEALTH_PORT/healthz"]
      initialDelaySeconds: 15
      periodSeconds: 30
      failureThreshold: 3
    readinessProbe:
      exec:
        command: ["/bin/sh", "-c", "wget -q -O- http://localhost:$HEALTH_PORT/healthz"]
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

  dashboards:
    default:
      ohm-windows-desktop:
        gnetId: 11587
        revision: 14
        datasource:
          - name: DS_PROMETHEUS
            value: VictoriaMetrics
      windows-exporter:
        gnetId: 23942
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: VictoriaMetrics
      cloudflare-tunnel:
        gnetId: 24874
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: VictoriaMetrics

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          access: proxy
          url: "http://vmsingle-vmstack-vmks.monitoring.svc:8428"
          isDefault: false
          editable: true
          jsonData:
            timeInterval: 30s
          prometheusType: Prometheus
        - name: VictoriaLogs
          type: victoriametrics-logs-datasource
          access: proxy
          url: "http://vlogs-victoria-logs-single-server.logging.svc:9428"
          isDefault: false
          editable: true

