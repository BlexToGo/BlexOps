---
# renovate: image=cloudflare/cloudflared
cloudflare_tunnel_image_tag: 2026.5.2
cloudflare_tunnel_name: blex-cluster

cloudflare_api_token: "{{ lookup('community.general.onepassword', 'Cloudflare', section='tokens', field='cloudflare-tunnel', vault='BlexOps', subdomain=onepassword_subdomain, domain=onepassword_domain, service_account_token=onepassword_service_account_token) }}"
cloudflare_account_id: "{{ lookup('community.general.onepassword', 'Cloudflare', field='account id', vault='BlexOps', subdomain=onepassword_subdomain, domain=onepassword_domain, service_account_token=onepassword_service_account_token) }}"
cloudflare_zone_id: "{{ lookup('community.general.onepassword', 'Cloudflare', field='zone id', vault='BlexOps', subdomain=onepassword_subdomain, domain=onepassword_domain, service_account_token=onepassword_service_account_token) }}"

cloudflare_tunnel_ingress:
  - hostname: "grafana.{{ domain_name }}"
    service: "http://grafana.monitoring.svc.cluster.local:80"
    originRequest: {}
  - hostname: "ha.{{ domain_name }}"
    service: "http://home-assistant.home-assistant.svc.cluster.local:8080"
    originRequest: {}
  - service: "http_status:404"
