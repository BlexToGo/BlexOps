---
- name: Create Grafana admin credentials Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: grafana-admin-credentials
        namespace: "{{ grafana_namespace }}"
      type: Opaque
      stringData:
        admin-user: "{{ grafana_admin_username }}"
        admin-password: "{{ grafana_admin_password }}"

- name: Create Grafana PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: grafana
        namespace: "{{ grafana_namespace }}"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Mi

- name: Deploy Grafana Helm chart
  kubernetes.core.helm:
    name: "{{ grafana_release_name }}"
    update_repo_cache: true
    chart_ref: oci://ghcr.io/grafana-community/helm-charts/grafana
    chart_version: "{{ grafana_chart_version }}"
    release_namespace: "{{ grafana_namespace }}"
    create_namespace: true
    values:
      "{{ grafana_values }}"

- name: Apply Grafana NetworkPolicy
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: grafana-ingress
        namespace: "{{ grafana_namespace }}"
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
        policyTypes:
          - Ingress
        ingress:
          # Allow traffic from cloudflared pods only (web requests through the tunnel)
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: cloudflare-tunnel
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: cloudflare-tunnel
            ports:
              - protocol: TCP
                port: 3000
          # Allow vmagent to scrape Grafana's /metrics endpoint
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: "{{ grafana_namespace }}"
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmagent
            ports:
              - protocol: TCP
                port: 3000
