---
- name: Add Helm repository for Grafana
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts

- name: Deploy Grafana Helm chart
  kubernetes.core.helm:
    name: "{{ grafana_release_name }}"
    update_repo_cache: true
    chart_ref: grafana/grafana
    chart_version: "{{ grafana_chart_version }}"
    release_namespace: "{{ grafana_namespace }}"
    create_namespace: true
    values:
      "{{ grafana_values }}"

- name: Apply Grafana NetworkPolicy
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: grafana-ingress
        namespace: "{{ grafana_namespace }}"
      spec:
        podSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
        policyTypes:
          - Ingress
        ingress:
          # Allow traffic from cloudflared pods only (web requests through the tunnel)
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: cloudflare-tunnel
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: cloudflare-tunnel
            ports:
              - protocol: TCP
                port: 3000
          # Allow vmagent to scrape Grafana's /metrics endpoint
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: "{{ grafana_namespace }}"
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmagent
            ports:
              - protocol: TCP
                port: 3000
