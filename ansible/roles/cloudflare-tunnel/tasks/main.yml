---
# --- Tunnel provisioning via Cloudflare API ---

- name: Check for existing Cloudflare Tunnel
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/cfd_tunnel?name={{ cloudflare_tunnel_name }}&is_deleted=false"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
  register: _cf_tunnel_list

- name: Create Cloudflare Tunnel
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/cfd_tunnel"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    body_format: json
    body:
      name: "{{ cloudflare_tunnel_name }}"
      config_src: "cloudflare"
    status_code: 200
  register: _cf_tunnel_created
  when: _cf_tunnel_list.json.result | length == 0
  no_log: true

- name: Set tunnel ID
  ansible.builtin.set_fact:
    _cf_tunnel_id: >-
      {{ (_cf_tunnel_list.json.result | first).id
         if _cf_tunnel_list.json.result | length > 0
         else _cf_tunnel_created.json.result.id }}

- name: Get tunnel token
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/cfd_tunnel/{{ _cf_tunnel_id }}/token"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
  register: _cf_tunnel_token
  no_log: true

# --- Tunnel ingress configuration ---

- name: Configure tunnel ingress rules
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/accounts/{{ cloudflare_account_id }}/cfd_tunnel/{{ _cf_tunnel_id }}/configurations"
    method: PUT
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    body_format: json
    body:
      config:
        ingress: "{{ cloudflare_tunnel_ingress }}"
    status_code: 200

# --- DNS record creation ---

- name: Check existing DNS records
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records?type=CNAME&name={{ item.hostname }}"
    method: GET
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
  register: _cf_dns_check
  loop: "{{ cloudflare_tunnel_ingress | selectattr('hostname', 'defined') | list }}"

- name: Create DNS CNAME records
  ansible.builtin.uri:
    url: "https://api.cloudflare.com/client/v4/zones/{{ cloudflare_zone_id }}/dns_records"
    method: POST
    headers:
      Authorization: "Bearer {{ cloudflare_api_token }}"
    body_format: json
    body:
      type: CNAME
      proxied: true
      name: "{{ item.item.hostname }}"
      content: "{{ _cf_tunnel_id }}.cfargotunnel.com"
    status_code: 200
  loop: "{{ _cf_dns_check.results }}"
  when: item.json.result | length == 0

# --- Kubernetes resource deployment ---

- name: Deploy ServiceAccount for Cloudflare Tunnel
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: cloudflare-tunnel
        namespace: "{{ cloudflare_tunnel_namespace }}"

- name: Deploy Secret for Cloudflare Tunnel
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudflare-tunnel-token
        namespace: "{{ cloudflare_tunnel_namespace }}"
      stringData:
        tunnelToken: "{{ _cf_tunnel_token.json.result }}"
  no_log: true

- name: Deploy Cloudflare Tunnel Deployment
  kubernetes.core.k8s:
    state: present
    definition: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cloudflare-tunnel
        namespace: {{ cloudflare_tunnel_namespace }}
      spec:
        replicas: {{ cloudflare_tunnel_replicas | int }}
        selector:
          matchLabels:
            app.kubernetes.io/name: cloudflare-tunnel
        template:
          metadata:
            labels:
              app.kubernetes.io/name: cloudflare-tunnel
              app.kubernetes.io/version: {{ cloudflare_tunnel_image_tag }}
            annotations:
              checksum/secret: {{ _cf_tunnel_token.json.result | hash('sha256') }}
          spec:
            serviceAccountName: cloudflare-tunnel
            containers:
              - name: cloudflared
                image: cloudflare/cloudflared:{{ cloudflare_tunnel_image_tag }}
                imagePullPolicy: IfNotPresent
                command:
                  - cloudflared
                  - tunnel
                  - --no-autoupdate
                  - --metrics
                  - 0.0.0.0:{{ cloudflare_tunnel_metrics_port }}
                  - run
                env:
                  - name: TUNNEL_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: cloudflare-tunnel-token
                        key: tunnelToken
                ports:
                  - name: metrics
                    containerPort: {{ cloudflare_tunnel_metrics_port }}
                    protocol: TCP
                livenessProbe:
                  httpGet:
                    path: /ready
                    port: {{ cloudflare_tunnel_metrics_port }}
                  failureThreshold: 1
                  initialDelaySeconds: 10
                  periodSeconds: 10

- name: Deploy VMPodScrape for Cloudflare Tunnel
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operator.victoriametrics.com/v1beta1
      kind: VMPodScrape
      metadata:
        name: cloudflare-tunnel
        namespace: "{{ cloudflare_tunnel_namespace }}"
        labels:
          app.kubernetes.io/name: cloudflare-tunnel
      spec:
        selector: {}
        podMetricsEndpoints:
          - port: metrics
            path: /metrics
